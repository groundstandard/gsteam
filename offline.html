<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>gsTeam — Offline</title>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#0B0E14">
<style>
  html, body { margin: 0; padding: 0; min-height: 100vh; background: #F5EFE4; }
  body {
    font-family: 'IBM Plex Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased;
    color: #1a1a1a; display: flex; align-items: center; justify-content: center;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap { max-width: 360px; padding: 24px; text-align: center; }
  .icon {
    width: 56px; height: 56px; border-radius: 14px; background: #0E1A35; color: #F5EFE4;
    display: flex; align-items: center; justify-content: center; margin: 0 auto 18px;
    font-family: Georgia, serif; font-weight: 600; font-size: 28px; letter-spacing: -1px;
  }
  h1 { font-family: Georgia, serif; font-size: 24px; margin: 0 0 8px; color: #0E1A35; letter-spacing: -0.5px; }
  p { font-size: 14px; color: #555; line-height: 1.5; margin: 0 0 18px; }
  button {
    background: #0E1A35; color: #F5EFE4; border: none; border-radius: 999px;
    padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  button:hover { background: #1a2a4a; }
  .small { font-size: 11px; color: #888; margin-top: 24px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">G</div>
  <h1>You're offline</h1>
  <p>gsTeam needs an internet connection to load your latest data. Check your connection and try again.</p>
  <button onclick="location.reload()">Try again</button>
  <div class="small">Some content may still be cached and accessible — try the home button.</div>
</div>
</body>
</html>
